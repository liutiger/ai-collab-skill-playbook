  </text>
  <text x="120" y="438" fill="#D5E8DD" font-family="Helvetica, Arial, sans-serif" font-size="19">
    and knowledge sink rules.
  </text>

  <text x="509" y="286" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    EXECUTION
  </text>
  <text x="509" y="332" fill="white" font-family="Georgia, serif" font-size="36" font-weight="700">
    Skill Source
  </text>
  <text x="509" y="372" fill="#FFF0EA" font-family="Helvetica, Arial, sans-serif" font-size="22">
    Plan Gate -> Auto Dev
  </text>
  <text x="509" y="410" fill="#FFE1D6" font-family="Helvetica, Arial, sans-serif" font-size="19">
