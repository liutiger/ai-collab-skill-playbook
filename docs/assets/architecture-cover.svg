  </text>

  <path d="M414 336H458" stroke="#805041" stroke-width="8" stroke-linecap="round"/>
  <path d="M803 336H847" stroke="#4E6583" stroke-width="8" stroke-linecap="round"/>
  <path d="M448 320L472 336L448 352" fill="none" stroke="#805041" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M837 320L861 336L837 352" fill="none" stroke="#4E6583" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="92" y="518" width="1096" height="114" rx="28" fill="#111111" fill-opacity="0.92"/>
    <text x="132" y="568" fill="#F5F5F5" font-family="Helvetica, Arial, sans-serif" font-size="19">
