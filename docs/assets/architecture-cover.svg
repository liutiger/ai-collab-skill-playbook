  </text>
  <text x="120" y="332" fill="white" font-family="Georgia, serif" font-size="36" font-weight="700">
    Charter
  </text>
  <text x="120" y="372" fill="#EAF4EE" font-family="Helvetica, Arial, sans-serif" font-size="22">
    Workflow
  </text>
  <text x="120" y="410" fill="#D5E8DD" font-family="Helvetica, Arial, sans-serif" font-size="19">
