  </text>
  <text x="509" y="438" fill="#FFE1D6" font-family="Helvetica, Arial, sans-serif" font-size="19">
    prompts, and runtime generation.
  </text>

  <text x="898" y="286" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    DELIVERY
  </text>
  <text x="898" y="332" fill="white" font-family="Georgia, serif" font-size="36" font-weight="700">
    Eval Gate
  </text>
  <text x="898" y="372" fill="#E8F1FF" font-family="Helvetica, Arial, sans-serif" font-size="22">
