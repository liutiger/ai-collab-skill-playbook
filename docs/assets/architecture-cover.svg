<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="1184" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F1E8"/>
      <stop offset="0.52" stop-color="#E7EFE7"/>
      <stop offset="1" stop-color="#E6EEF9"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1F4D3E"/>
      <stop offset="1" stop-color="#356B58"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9C4A2B"/>
      <stop offset="1" stop-color="#C36A42"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#224B7A"/>
      <stop offset="1" stop-color="#3A6A9B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#102020" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="url(#bg)"/>
  <circle cx="110" cy="104" r="72" fill="#D77E5C" fill-opacity="0.18"/>
  <circle cx="1184" cy="616" r="92" fill="#5B84B8" fill-opacity="0.18"/>
  <circle cx="1128" cy="118" r="48" fill="#5E9175" fill-opacity="0.22"/>

  <text x="88" y="118" fill="#1C1C1C" font-family="Georgia, serif" font-size="48" font-weight="700">
