  </text>
  <text x="88" y="162" fill="#555555" font-family="Helvetica, Arial, sans-serif" font-size="23">
    Turn growing prompt piles into a governed workflow with skills, gates, routing, and docs sinks.
  </text>

  <g filter="url(#shadow)">
    <rect x="88" y="232" width="326" height="206" rx="28" fill="url(#cardA)"/>
    <rect x="477" y="232" width="326" height="206" rx="28" fill="url(#cardB)"/>
    <rect x="866" y="232" width="326" height="206" rx="28" fill="url(#cardC)"/>
  </g>

  <text x="120" y="286" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
