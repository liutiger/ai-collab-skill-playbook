<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="1116" y2="582" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EFE6"/>
      <stop offset="0.5" stop-color="#EBF1E8"/>
      <stop offset="1" stop-color="#E6EEF8"/>
    </linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4C3D"/>
      <stop offset="1" stop-color="#2F6952"/>
    </linearGradient>
    <linearGradient id="panelB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A34B2B"/>
      <stop offset="1" stop-color="#C86D46"/>
    </linearGradient>
    <linearGradient id="panelC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#244C7A"/>
      <stop offset="1" stop-color="#4470A6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#102021" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="96" cy="96" r="70" fill="#D77E5C" fill-opacity="0.18"/>
  <circle cx="1086" cy="536" r="86" fill="#5B84B8" fill-opacity="0.18"/>
  <circle cx="1030" cy="112" r="46" fill="#5E9175" fill-opacity="0.2"/>

  <text x="72" y="110" fill="#171717" font-family="Georgia, serif" font-size="42" font-weight="700">
