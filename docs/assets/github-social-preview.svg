  <path d="M388 327H426" stroke="#805041" stroke-width="8" stroke-linecap="round"/>
  <path d="M758 327H796" stroke="#4E6583" stroke-width="8" stroke-linecap="round"/>
  <path d="M417 311L439 327L417 343" fill="none" stroke="#805041" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M787 311L809 327L787 343" fill="none" stroke="#4E6583" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
