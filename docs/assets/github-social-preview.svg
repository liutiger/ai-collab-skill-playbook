  </text>

  <g filter="url(#shadow)">
    <rect x="72" y="218" width="316" height="214" rx="28" fill="url(#panelA)"/>
    <rect x="442" y="218" width="316" height="214" rx="28" fill="url(#panelB)"/>
    <rect x="812" y="218" width="316" height="214" rx="28" fill="url(#panelC)"/>
  </g>

  <text x="102" y="272" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700">
