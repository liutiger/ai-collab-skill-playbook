        "id": "wms-plan-gate",
        "filename": "prompts/wms-plan-gate.prompt.md",
        "description": "WMS 通用方案确认总控：先判定章程场景，再澄清目标、定位上下文、给最小方案并停在待确认",
        "triggers": ["方案核对", "先出方案", "待确认", "先定位上下文"],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/09-plan-gate.md"
        ],
        "requirements": [
          "先判断任务属于哪个章程标准场景（01~08）；若无法明确，停在待确认",
          "明确该场景的专项检查重点、风险控制和产出物要求",
          "再按 Planner / Context Analyst / Solution Architect 输出",
          "若命中章程高风险条件（边界不清 / 跨模块 / 跨服务 / 公共接口 / 核心链路 / 方案存在取舍），必须停在“待确认”，不要进入实现"
        ]
      },
      {
        "id": "wms-feature-plan",
        "filename": "prompts/wms-feature-plan.prompt.md",
        "description": "WMS 新功能方案确认：先定位上下文、给最小改动方案并停在待确认",
        "triggers": ["新增功能方案", "新功能先给方案", "功能设计", "确认后再实现"],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/09-plan-gate.md",
          "docs/prompts/01-feature-dev.md"
        ],
        "requirements": [
          "先按 Planner / Context Analyst / Solution Architect 输出",
          "优先 GitNexus，不要直接全项目搜索",
          "停在“待确认”，不要进入实现",
          "结果写入 docs/tasks 对应任务目录的 artifacts/plan-gate.md"
        ]
      },
      {
        "id": "wms-auto-dev",
        "filename": "prompts/wms-auto-dev.prompt.md",
        "description": "WMS 通用多角色自动开发总控：先判定章程场景，再在满足条件时进入分析、实现、自检、评测门禁、落盘闭环",
        "triggers": ["自动开发", "多角色自动开发", "完整闭环", "分析实现测试落盘"],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/07-auto-dev-orchestration.md"
        ],
        "requirements": [
          "先判断任务属于哪个章程标准场景（01~08）或标记为跨场景，并先说明采用的专项检查点",
          "若场景不清或命中章程高风险条件（边界不清 / 跨模块 / 跨服务 / 公共接口 / 核心链路 / 方案存在取舍），先停在方案阶段，待人工确认后再实现",
          "确认可以继续后，再按 Planner / Context Analyst / Solution Architect / Implementer / Reviewer & Tester / Evaluator / Gatekeeper / Documenter 分阶段执行",
          "结束前必须完成自检、评测门禁结论和 docs/tasks 沉淀；若门禁未通过，不得写完成标记"
        ]
      },
      {
        "id": "wms-feature-dev",
        "filename": "prompts/wms-feature-dev.prompt.md",
        "description": "WMS 新功能实现闭环：分析、实现、自检、测试和文档沉淀",
        "triggers": ["按方案继续实现", "开始写代码", "做一个新功能"],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/07-auto-dev-orchestration.md",
          "docs/prompts/01-feature-dev.md"
        ],
        "requirements": [
          "若命中章程高风险条件（边界不清 / 跨模块 / 跨服务 / 公共接口 / 核心链路 / 方案存在取舍），先切到 plan-gate 风格，停在待确认",
          "若任务目录不存在，先初始化 docs/tasks 目录",
          "先更新任务文档，再进入代码实现",
          "改完后必须做自检和测试，并补齐评测门禁结论",
          "把结果继续沉淀到 docs/tasks 和 business-insights.md；无 eval-report 时不得视为完成"
        ]
      },
      {
        "id": "wms-evaluation-gate",
        "filename": "prompts/wms-evaluation-gate.prompt.md",
        "description": "WMS 自动评测与交付验收门禁：确定评测范围、执行必要门禁、输出结构化评测结论，并决定是否允许完成",
        "triggers": ["自动评测", "验收门禁", "评测流水线", "跑测试后给结论"],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/10-evaluation-gate.md"
