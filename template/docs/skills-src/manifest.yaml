    "promptFiles": [
      {
        "id": "wms-plan-gate",
        "filename": "prompts/wms-plan-gate.prompt.md",
        "description": "WMS 通用方案确认总控：先经场景路由判主场景，再澄清目标、定位上下文、给最小方案并停在待确认",
        "triggers": [
          "方案核对",
          "先出方案",
          "待确认",
          "先定位上下文"
        ],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/11-scene-router.md",
          "docs/prompts/12-scene-catalog.md",
          "docs/prompts/09-plan-gate.md"
        ],
        "requirements": [
          "先通过 scene-router 判定主场景；若无法明确，停在待确认",
          "结合 scene-catalog 中对应章节，明确该主场景的专项检查重点、风险控制和产出物要求",
          "再按 Planner / Context Analyst / Solution Architect 输出",
          "若命中章程高风险条件（边界不清 / 跨模块 / 跨服务 / 公共接口 / 核心链路 / 方案存在取舍），必须停在“待确认”，不要进入实现"
        ]
      },
      {
        "id": "wms-auto-dev",
        "filename": "prompts/wms-auto-dev.prompt.md",
        "description": "WMS 通用多角色自动开发总控：先经场景路由判主场景，再在满足条件时进入分析、实现、自检、评测门禁、落盘闭环",
        "triggers": [
          "自动开发",
          "多角色自动开发",
          "完整闭环",
          "分析实现测试落盘"
        ],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/11-scene-router.md",
          "docs/prompts/12-scene-catalog.md",
          "docs/prompts/07-auto-dev-orchestration.md"
        ],
        "requirements": [
          "先通过 scene-router 判定主场景或标记为跨场景，并结合 scene-catalog 对应章节说明采用的专项检查点",
          "若场景不清或命中章程高风险条件（边界不清 / 跨模块 / 跨服务 / 公共接口 / 核心链路 / 方案存在取舍），先停在方案阶段，待人工确认后再实现",
          "确认可以继续后，再按 Planner / Context Analyst / Solution Architect / Implementer / Reviewer & Tester / Evaluator / Gatekeeper / Documenter 分阶段执行",
          "结束前必须完成自检、评测门禁结论和 docs/tasks 沉淀；若门禁未通过，不得写完成标记"
        ]
      },
      {
        "id": "wms-evaluation-gate",
        "filename": "prompts/wms-evaluation-gate.prompt.md",
        "description": "WMS 自动评测与交付验收门禁：确定评测范围、执行必要门禁、输出结构化评测结论，并决定是否允许完成",
        "triggers": [
          "自动评测",
          "验收门禁",
          "评测流水线",
          "跑测试后给结论"
        ],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/10-evaluation-gate.md"
        ],
        "requirements": [
          "先判断本次改动的影响模块、改动类型和必须执行的评测门禁",
          "先写出评测计划，再执行编译、测试和按风险需要补充的静态检查门禁",
          "必须输出结构化评测结果，明确 PASS / CONDITIONAL_PASS / BLOCKED / FAIL 结论",
          "若关键门禁失败或未执行，不得写完成标记，必须明确下一步补救动作"
        ]
      },
      {
        "id": "wms-link-trace",
        "filename": "prompts/wms-link-trace.prompt.md",
        "description": "WMS 链路确认：确认真实执行链路、分支和副作用，并沉淀到 docs",
        "triggers": [
          "确认链路",
          "有没有真正落盘",
          "MQ 链路",
          "副作用点"
        ],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/08-link-confirmation.md"
        ],
        "requirements": [
          "先界定起点、终点和范围",
          "以真实代码顺序列出主链路和关键分支",
          "区分 DB 写入、MQ、Feign 等副作用",
          "把结果写入 docs/tasks 对应任务目录的 artifacts/link-trace.md"
        ]
      },
      {
        "id": "wms-scene-router",
        "filename": "prompts/wms-scene-router.prompt.md",
        "description": "WMS 场景路由入口：识别功能开发、排障、Review、数据库变更、重构或文档任务，并结合统一场景目录推荐下一步阶段入口",
        "triggers": [
          "新增功能",
          "线上异常",
          "帮我 review",
          "DDL",
          "重构",
          "写文档",
          "该走哪个流程",
          "帮我判断场景"
        ],
        "refs": [
          "docs/prompts/00-department-standards.md",
          "docs/prompts/11-scene-router.md",
          "docs/prompts/12-scene-catalog.md"
        ],
        "requirements": [
          "必须在 01~06 中选择一个主场景；必要时最多补一个次场景",
          "输出命中信号、专项检查重点、默认产出物和下一步推荐入口",
          "专项检查点必须来自 scene-catalog 中对应章节，而不是临场自由发挥",
          "若边界不清或命中高风险条件，下一步必须推荐 /wms-plan-gate；若改动已存在则优先推荐 /wms-evaluation-gate；若目标是确认真实链路，则优先推荐 /wms-link-trace"
        ]
      }
    ]
  },
